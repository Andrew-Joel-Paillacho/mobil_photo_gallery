<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Tab 1
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Tab 1</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- Contenedor para centrar el botón -->
  <div style="display:flex; justify-content:center; align-items:center; height:100%;">
    <ion-button color="danger" shape="round" (click)="presentAlert()" style="--border-radius:50px; width:200px; height:50px;">
      Mostrar advertencia
    </ion-button>
  </div>
</ion-content>
